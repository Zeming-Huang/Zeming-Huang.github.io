# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve`. If you change this file, please restart the server process.

# ============================
# TODO: Fill these first
# - title / description: homepage title + one-line tagline
# - repository: "USERNAME/USERNAME.github.io"
# - author.*: your name, affiliation, email, links, avatar
# - author.googlescholar: your Google Scholar profile URL (contains user=XXXX)
# - (optional) analytics + SEO verification codes
# ============================

# Site Settings
title: "Welcome to Zeming'Homepage" # TODO: e.g. "Your Name | Homepage"
description: "" # TODO: 1-line bio / research area
repository: "Zeming-Huang/acad-homepage.github.io" # TODO: set to "USERNAME/REPO" (NOT a URL). If your repo is "USERNAME/USERNAME.github.io", use that.
baseurl: "/acad-homepage.github.io" # GitHub Pages project site needs this; if you rename repo to "Zeming-Huang.github.io", set this to "".
google_scholar_stats_use_cdn: true

# Google Analytics
google_analytics_id: # TODO(optional): GA4 measurement id, e.g. "G-XXXXXXXXXX"

# Masthead (top navigation bar)
masthead_enabled: false # TODO: set true to show the top navigation bar

# SEO Related
google_site_verification: # TODO(optional)
bing_site_verification: # TODO(optional)
baidu_site_verification: # TODO(optional)

# Site Author
author:
  name: "Zeming Huang" # TODO
  avatar: "/images/avatar.jpg" # TODO: your photo under images/
  bio: "University of Chinese Academy of Sciences" # TODO: position / affiliation
  location: "Beijing, China" # TODO
  employer: # TODO(optional)
  pubmed:
  googlescholar: "https://scholar.google.com/citations?user=YOUR_GOOGLE_SCHOLAR_ID" # TODO
  email: "huangzeming24@mails.ucas.ac.cn" # TODO
  researchgate: # TODO(optional): profile url
  uri:
  bitbucket:
  codepen:
  dribbble:
  flickr:
  facebook:
  foursquare:
  github: # TODO(optional): username (not url)
  google_plus:
  keybase:
  instagram:
  impactstory: # TODO(optional): profile url
  lastfm:
  linkedin: # TODO(optional): username (not url)
  dblp: # TODO(optional): url
  orcid: # TODO(optional): url
  pinterest:
  soundcloud:
  stackoverflow: # http://stackoverflow.com/users/123456/username
  steam:
  tumblr:
  twitter:
  vine:
  weibo:
  xing:
  youtube:
  wikipedia:

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - docs
  - google_scholar_crawler
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - .github
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Defaults
defaults:
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: default
      author_profile: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed # http://sass-lang.com/documentation/file.SASS_REFERENCE.html#output_style

# Outputting
permalink: /:categories/:title/
timezone: Asia/Shanghai # http://en.wikipedia.org/wiki/List_of_tz_database_time_zones

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
# mimic GitHub Pages with --safe
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji

# HTML Compression
# - http://jch.penibelst.de/
compress_html:
  clippings: all
  ignore:
    envs: development
